<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresha · Discovery Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F8FA;
  --surf: #FFFFFF;
  --surf2: #F1F3F5;
  --border: #E5E7EB;
  --border2: #D1D5DB;
  --text: #0F172A;
  --muted: #4B5563;
  --muted2: #9CA3AF;
  --accent: #000000;
  --accent-highlight: #0050FF;
  --t1: #0050FF; --t1d: rgba(0, 80, 255, 0.08);
  --t2: #F59E0B; --t2d: rgba(245, 158, 11, 0.12);
  --t3: #EF4444; --t3d: rgba(239, 68, 68, 0.12);
  --t4: #10B981; --t4d: rgba(16, 185, 129, 0.12);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 2px 6px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.03);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
button{cursor:pointer;font-family:inherit}
textarea{font-family:inherit;caret-color:var(--accent-highlight)}

.app{display:flex;height:100vh;overflow:hidden}

/* RTL support */
[dir="rtl"] .sidebar{border-right:none;border-left:1px solid var(--border)}
[dir="rtl"] .topic-item{border-left:none;border-right:3px solid transparent}
[dir="rtl"] .topic-item.active{border-left-color:transparent;border-right-color:var(--accent-highlight)}
[dir="rtl"] .q-ta,[dir="rtl"] .p-ta{text-align:right;direction:rtl}

.sidebar{width:240px;min-width:240px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden;box-shadow:var(--shadow-sm);z-index:10}
.side-top{padding:20px 16px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-weight:700;font-size:16px;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:8px;letter-spacing:-0.2px}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
.mode-row{display:grid;grid-template-columns:1fr 1fr;background:var(--surf2);border-radius:8px;padding:4px;gap:2px}
.mode-btn{padding:8px 0;border:none;border-radius:6px;background:transparent;color:var(--muted);font-size:12px;font-weight:600;transition:all .2s;text-align:center}
.mode-btn.active{background:var(--surf);color:var(--accent);box-shadow:var(--shadow-sm)}

/* Language selector */
.lang-row{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--surf2);border-radius:8px;padding:3px;gap:2px;margin-top:10px}
.lang-btn{padding:6px 0;border:none;border-radius:6px;background:transparent;color:var(--muted);font-size:11px;font-weight:600;transition:all .2s;text-align:center}
.lang-btn.active{background:var(--surf);color:var(--accent-highlight);box-shadow:var(--shadow-sm)}

.side-sect{padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.side-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);margin-bottom:12px}
.client-btn{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:1px solid transparent;background:transparent;width:100%;margin-bottom:4px;transition:all .2s;text-align:left}
.client-btn:hover{background:var(--surf2)}
.client-btn.active{background:var(--t1d);border-color:rgba(0,80,255,0.2)}
.client-icon{font-size:16px;flex-shrink:0}
.client-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:2px}
.client-sub{font-size:11px;color:var(--muted);font-weight:400}

.topic-list{flex:1;overflow-y:auto;padding:12px 8px 24px}
.topic-item{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:8px;cursor:pointer;border-left:3px solid transparent;margin-bottom:2px;transition:all .2s}
.topic-item:hover{background:var(--surf2)}
.topic-item.active{background:var(--t1d);border-left-color:var(--accent-highlight)}
.topic-n{font-size:11px;font-weight:700;color:var(--muted2);width:16px;flex-shrink:0;margin-top:1px}
.topic-item.active .topic-n{color:var(--accent-highlight)}
.topic-ns{font-size:13px;font-weight:500;color:var(--muted);line-height:1.4}
.topic-item.active .topic-ns{color:var(--accent);font-weight:600}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surf);z-index:5}
.topbar-eye{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);margin-bottom:4px}
.topbar-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.4px;line-height:1.2}
.persona-badge{display:flex;align-items:center;gap:8px;background:var(--surf2);border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:12px;color:var(--muted)}
.persona-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.persona-name{color:var(--text);font-weight:600}

.content{flex:1;overflow-y:auto;padding:28px 32px 48px}

.intro-box{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:24px;font-size:14px;color:var(--muted);line-height:1.6;box-shadow:var(--shadow-sm)}
.fw-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.fw-pill{border-radius:10px;padding:12px 14px;border:1px solid;box-shadow:var(--shadow-sm)}
.fw-label{font-weight:700;font-size:12px;margin-bottom:4px;letter-spacing:0.3px}
.fw-desc{font-size:12px;color:var(--muted);line-height:1.4}

.q-block{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;background:var(--surf);transition:all .2s;box-shadow:var(--shadow-sm)}
.q-block:focus-within{border-color:var(--accent-highlight);box-shadow:0 0 0 3px var(--t1d)}
.q-head{display:flex;align-items:center;gap:12px;padding:12px 16px 10px;border-bottom:1px solid var(--border);background:var(--bg)}
.q-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:0.5px}
.q-prompt{font-size:13px;color:var(--text);font-weight:500}
.q-input-row{display:flex;align-items:flex-start;gap:10px;padding:12px 16px 14px}
.q-ta{flex:1;background:transparent;border:none;font-size:15px;color:var(--text);resize:none;min-height:48px;line-height:1.6;outline:none}
.q-ta::placeholder{color:var(--muted2)}

.q-fb{border-top:1px solid var(--border);padding:16px 18px;background:var(--surf2);display:none}
.q-fb.show{display:block}
.fb-scores{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.fb-chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid;background:var(--surf)}
.fb-text{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:14px}
.fb-model-box{background:var(--t1d);border:1px solid rgba(0,80,255,0.15);border-radius:8px;padding:12px 16px}
.fb-model-lbl{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--accent-highlight);margin-bottom:6px}
.fb-model-q{font-size:14px;color:var(--text);line-height:1.5;font-style:italic;font-weight:500}

.print-bar{display:flex;align-items:center;justify-content:space-between;margin-top:24px;padding:16px 20px;background:var(--surf);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-sm)}
.print-btn{padding:10px 18px;background:var(--surf2);border:1px solid var(--border2);color:var(--text);border-radius:8px;font-size:13px;font-weight:600;transition:all 0.2s}
.print-btn:hover{background:var(--border);border-color:var(--muted2)}

.mic-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:2px;transition:all .2s;color:var(--muted);box-shadow:var(--shadow-sm)}
.mic-btn:hover{background:var(--surf2);color:var(--text)}
.mic-btn.recording{background:#FEE2E2;border-color:var(--t3);color:var(--t3);animation:micpulse 1s infinite}
.mic-btn.unavailable{opacity:0.35;cursor:not-allowed}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.3)}50%{box-shadow:0 0 0 5px rgba(239,68,68,0)}}

/* Mic toast */
.mic-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--surf);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center;max-width:90vw}
.mic-toast.show{opacity:1}

.practice-wrap{display:flex;flex-direction:column;height:100%}
.setup-card{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;box-shadow:var(--shadow-sm)}
.setup-title{font-weight:700;font-size:16px;margin-bottom:6px}
.setup-sub{font-size:14px;color:var(--muted)}
.start-btn{padding:12px 24px;background:var(--accent);color:var(--surf);border:none;border-radius:8px;font-size:14px;font-weight:700;transition:all .2s;box-shadow:var(--shadow-sm)}
.start-btn:hover{background:#333;transform:translateY(-1px)}
.start-btn.sec{background:var(--surf);color:var(--text);border:1px solid var(--border2)}
.start-btn.sec:hover{background:var(--surf2)}

.ft-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
.ft-step{padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surf);text-align:center;transition:all .2s;box-shadow:var(--shadow-sm)}
.ft-step.active{background:var(--surf2);border-color:var(--accent-highlight);box-shadow:0 0 0 2px var(--t1d)}
.ft-step.done{opacity:0.5;box-shadow:none}
.ft-step-lbl{font-size:12px;font-weight:800;margin-bottom:4px}
.ft-step-desc{font-size:11px;color:var(--muted)}

.thread{flex:1;overflow-y:auto;padding-bottom:20px}
.msg{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px;animation:fadeup .3s ease both}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.rep{justify-content:flex-end}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:2px;background:var(--surf2);border:1px solid var(--border2)}
.avatar.coach{background:var(--t1d);border-color:rgba(0,80,255,0.2);color:var(--accent-highlight)}
.msg-body{max-width:85%}
.msg-name{font-size:12px;font-weight:700;letter-spacing:0.5px;margin-bottom:6px}
.msg-name.prospect{color:var(--muted)}
.msg-name.coach{color:var(--accent-highlight)}
.bubble{padding:14px 18px;border-radius:12px;line-height:1.6;border:1px solid var(--border);background:var(--surf);color:var(--text);box-shadow:var(--shadow-sm)}
.bubble.prospect{font-size:15px;background:#FFFFFF}
.bubble.coach{background:var(--t1d);border-color:rgba(0,80,255,0.15);font-size:14px;color:var(--text)}
.bubble.rep-bubble{font-size:15px;background:var(--bg)}
.rep-t-label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}

.coach-scores{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.c-chip{font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;border:1px solid;background:var(--surf)}
.coach-fb{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:0}
.coach-model{margin-top:14px;padding-top:12px;border-top:1px solid rgba(0,80,255,0.1)}
.coach-model-lbl{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--accent-highlight);margin-bottom:6px}
.coach-model-q{font-size:14px;color:var(--text);font-style:italic;line-height:1.5}

.dots{display:flex;gap:5px;padding:4px 0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent-highlight);animation:dp 1.2s infinite ease-in-out}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

.input-area{background:var(--surf);border:1px solid var(--border);border-radius:12px;overflow:hidden;flex-shrink:0;margin-top:16px;box-shadow:var(--shadow-md)}
.input-head{display:flex;align-items:center;gap:12px;padding:12px 16px 10px;border-bottom:1px solid var(--border);background:var(--bg)}
.input-row{display:flex;gap:10px;padding:14px 16px 16px}
.p-ta{flex:1;background:transparent;border:none;font-size:15px;color:var(--text);resize:none;min-height:48px;line-height:1.6;outline:none}
.p-ta::placeholder{color:var(--muted2)}
.send-btn{padding:10px 20px;background:var(--accent);color:var(--surf);border:none;border-radius:8px;font-size:14px;font-weight:700;align-self:flex-end;white-space:nowrap;transition:all .2s;box-shadow:var(--shadow-sm)}
.send-btn:hover{background:#333;transform:translateY(-1px)}
.send-btn:disabled{background:var(--surf2);color:var(--muted2);cursor:not-allowed;box-shadow:none;transform:none}
.skip-btn{padding:10px 16px;background:transparent;color:var(--muted);border:1px solid var(--border2);border-radius:8px;font-size:13px;font-weight:600;align-self:flex-end;transition:all .2s}
.skip-btn:hover{border-color:var(--muted);color:var(--text);background:var(--surf2)}

.summary-card{background:var(--surf);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:12px;box-shadow:var(--shadow-md)}
.summary-head{padding:20px 24px;border-bottom:1px solid var(--border);background:var(--bg)}
.summary-title{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.summary-sub{font-size:14px;color:var(--muted)}
.summary-scores{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border)}
.sum-score{padding:20px 24px;text-align:center;border-right:1px solid var(--border)}
.sum-score:last-child{border-right:none}
.sum-val{font-size:32px;font-weight:800;margin-bottom:6px}
.sum-lbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.summary-body{padding:24px}
.sum-fb-title{font-weight:700;font-size:14px;margin-bottom:10px}
.sum-fb-text{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:20px}
.sum-btns{display:flex;gap:12px;flex-wrap:wrap}

@media(max-width:680px){
  .sidebar{display:none}
  .fw-bar{grid-template-columns:repeat(2,1fr)}
  .ft-bar{grid-template-columns:repeat(2,1fr)}
  .content{padding:20px}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="mic-toast" id="mic-toast"></div>

      ["Llaman, nos escriben por Instagram, algunos nos encuentran en Google. Es un poco caótico la verdad — no hay una ruta clara.", "Los mensajes de Instagram son lo peor. Los veo cuando estoy con un cliente y para cuando respondo ya se fueron a otro sitio. He perdido reservas así seguro.", "No sé el número exacto pero me molesta. Aunque sean dos o tres por semana — es un buen trozo de ingresos que se van por la puerta.", "Si alguien pudiera buscarnos y reservar al momento sin esperar a que yo responda — sería enorme. La mitad de mis mensajes son gente preguntando si tenemos hueco el sábado."],
      ["Pedimos anticipo a clientes nuevos pero la verdad no somos muy consistentes. A los habituales les confiamos, y no siempre sale bien.", "Las cancelaciones de última hora son las que matan. Alguien escribe a las 8 diciendo que no puede a las 10 — no hay forma de llenar ese hueco. Se pierde sin más.", "Una incomparecencia me cuesta el valor de la cita más el hecho de que rechacé a otros para ese turno. En una mala semana son unos 150, 200€ que desaparecen. Es desmoralizante más que nada.", "Si al menos pudiera guardar una tarjeta — para que la gente se lo piense dos veces antes de cancelar a última hora — eso cambiaría las cosas. Ahora mismo no hay consecuencias."],
      ["El sábado está lleno, lunes y martes son irregulares. He probado ofertas para días tranquilos pero no parecen mover mucho.", "El turno del martes al mediodía está casi siempre vacío. Y mi estilista junior muchas veces está esperando mientras el senior está completo. No es eficiente.", "Un martes flojo cuesta unos 200€ comparado con un día lleno. En un mes de martes flojos estamos hablando de casi mil euros que no genero. Es mi día menos eficiente.", "Si pudiera hacer que el martes se pareciera al sábado — aunque fuera un 70% — podría justificar mantener al junior a tiempo completo sin preocuparme por las horas."],
      ["Intentamos reagendar al final de la cita pero es inconsistente. Algunos reservan ahí mismo, otros dicen que llaman y luego no sabemos nada.", "No hay sistema de seguimiento. Si un habitual no ha venido en ocho semanas no me enteraría a menos que me acordara de ellos por casualidad.", "Perder un habitual que viene cada seis semanas — son unos 400 a 500€ al año que se van. Y normalmente te das cuenta cuando ya es tarde para hacer algo.", "Si los clientes recibieran un recordatorio automático — algo que dijera 'hace tiempo que no vienes, ¿reservamos?' — probablemente recuperaría a la mitad sin tener que hacer nada."],
      ["Tarjeta, efectivo, a veces transferencia para trabajos grandes. Al final del día cuadro a mano, cruzo la caja con los recibos de la terminal.", "Las transferencias son el problema — a veces los clientes se olvidan, tengo que perseguirles, es incómodo. Y cuadrar lleva como media hora cada noche.", "Media hora al día, cinco días a la semana — son dos horas y media de administración semanal solo en pagos. Preferiría estar haciendo literalmente cualquier otra cosa.", "Si todo entrara por un mismo sitio y los números cuadraran solos al final del día — no te puedo explicar cuánto más tranquilo sería el cierre."],
      ["Tengo tres estilistas y hacemos el horario por un grupo de WhatsApp. Más o menos funciona pero se complica cuando alguien quiere un día libre o cambia turno.", "Cuando alguien se pone enfermo el grupo de WhatsApp estalla. La mitad de las veces los clientes no se enteran hasta que llegan. Es vergonzoso.", "Las comisiones las hago en una hoja de cálculo a final de mes. Me lleva unas tres horas y he tenido dos disputas en el último año sobre si las cifras estaban bien.", "Si el equipo pudiera ver su propio horario y comisiones en tiempo real — menos preguntas para mí, menos caos de WhatsApp. Podría gestionar en vez de solo apagar fuegos."],
      ["Tenemos algunos productos de cuidado posterior, sobre todo las marcas que usamos. Los estilistas los mencionan a veces pero no hay un enfoque real.", "Depende completamente de quién atienda al cliente. Algunos de mi equipo son geniales recomendando, otros nunca lo mencionan. Y nos hemos quedado sin stock varias veces, lo cual queda fatal.", "Mi mejor estilista en ventas de producto hace cuatro o cinco veces más que los demás. Esa brecha es margen desperdiciado cada semana.", "Si recomendar producto fuera parte natural de la conversación del servicio — no venta agresiva, solo parte de lo que hacemos — creo que el retail podría ser una fuente de ingresos real en vez de algo secundario."],
      ["Reviso la caja al final del día y tengo una idea aproximada de cómo fue la semana. Mensualmente lo junto en una hoja de cálculo para ver dónde estamos.", "Si quiero saber qué estilista rinde mejor o qué servicios son más populares tengo que bucear en la hoja manualmente. No lo hago tanto como debería.", "El año pasado decidí eliminar un servicio porque pensé que no era rentable. Resulta que estaba equivocado — era bastante popular pero estaba mirando los números equivocados.", "Si pudiera abrir algo y ver exactamente de dónde viene el dinero, qué días y qué personal — podría tomar mejores decisiones. Ahora mismo es todo intuición."]
    ],
    multi: [
      ["Cada sede hace lo suyo — una está en Google, otra depende de los que pasan. No hay un enfoque unificado en el grupo.", "La inconsistencia es el problema. Una sede siempre está llena, las otras dos van irregular y no sabría decirte por qué.", "Una sede tranquila me cuesta en gastos fijos — alquiler, sueldos — contra menos ingresos. Tengo una que probablemente cuesta 4.000€ al mes de operar y factura 5.000€. Eso es demasiado justo.", "Si pudiera ver qué funciona en la sede activa y replicarlo en las demás — eso valdría mucho. Ahora mismo es todo a ciegas."],
      ["Cada sede tiene su propio número y algunas tienen reserva online, otras no. No es nada consistente.", "Las sedes sin reserva online pierden consultas fuera de horario. La gente nos busca a las 9 de la noche, no puede reservar, se va a otro sitio.", "Si una sola sede pierde cinco reservas a la semana fuera de horario son unos 500€ semanales. En tres sedes empieza a ser un número importante.", "Si las tres sedes tuvieran la misma experiencia de reserva sin fricción podría lanzar una campaña de marketing de verdad sabiendo que convertiría."],
      ["La política varía por sede — un gerente es estricto, otro más relajado. No hay un estándar de grupo.", "Me enteré el mes pasado de que una de mis sedes tiene un 20% de incomparecencias en clientes nuevos. El gerente no me lo había dicho.", "Con un 20% de incomparecencias en clientes nuevos en esa sede — es una de cada cinco citas que simplemente desaparece. En ticket medio podrían ser cuatro o cinco mil euros al mes.", "Si pudiera establecer la política una vez y que se aplique en las tres sedes automáticamente — sin excepciones de anticipo, sin que el personal tome decisiones que no le corresponden — eso cambiaría todo."],
      ["El sábado es fuerte en todas las sedes. Entre semana varía. No tengo visibilidad de la tasa de ocupación por sede sin pedirle a cada gerente que saque cifras.", "Creo que tengo personal en momentos tranquilos en algunas sedes pero no lo veo desde aquí. Para cuando me entero el coste ya ocurrió.", "Si una sede funciona al 50% de ocupación un miércoles — son sueldos muertos contra sillas vacías. Probablemente me cuesta 300-400€ de mano de obra ese día sin retorno.", "Si pudiera ver la ocupación por sede, día y estilista en tiempo real — podría gestionar esto en vez de solo reaccionar."],
      ["Cada sede lo hace diferente. Unas reagendan en el sillón, otras mandan mensaje. No hay estándar de grupo.", "Clientes que visitan una sede y luego se mudan — podrían estar cerca de otra de nuestras sedes pero no tenemos forma de saberlo ni contactarles.", "Un cliente que viene mensualmente durante toda su vida vale miles para el grupo. Cuando dejan de venir — incluso en todas nuestras sedes — no tenemos visibilidad de que ha pasado.", "Una base de datos compartida entre las tres sedes para que cualquiera pueda ver el historial y contactar — eso nos haría sentir como un grupo de verdad."],
      ["Cada sede tiene un sistema de caja diferente. La conciliación la hace cada gerente por separado y me la envían semanalmente.", "Consolidar los tres informes me lleva a mí o a mi asistente medio día cada semana. Y los formatos son todos distintos así que no es tarea rápida.", "Medio día a la semana son 26 días al año del tiempo de alguien. En salario fácilmente son 3.000 a 4.000€ al año solo en conciliación.", "Si tuviera un panel mostrándome lo que entró en las tres sedes ayer — podría detectar problemas inmediatamente en vez de enterarme una semana después."],
      ["Los gerentes manejan sus propios horarios y confío en que lo hagan. Pero he tenido situaciones donde me entero después de que la cobertura no se organizó bien.", "No puedo ver el rendimiento individual del personal entre sedes sin pedir a los gerentes que me envíen datos. Y no siempre lo presentan igual.", "Ascendí a alguien el año pasado que pensé que era buen rendidor. Resulta que sus números eran medianos — simplemente no había visto los datos de las otras sedes.", "Si pudiera ver el rendimiento de cada miembro del equipo en todas las sedes en una vista — no solo facturación sino ocupación, retención, puntualidad — gestionaría el grupo con mucha más confianza."],
      ["El retail queda en manos de los gerentes individuales. Una sede lo hace bien, las otras no tanto.", "No puedo ver el rendimiento de retail por sede de forma fácil. Creo que una sede apenas vende pero no tengo datos para cuestionarlo.", "Si mi mejor sede de retail hace 800€ al mes y las otras hacen 200€ — son 1.200€ al mes que debería estar generando y no genero. Son 14.000€ al año.", "Si pudiera comparar el rendimiento de retail sede por sede y poner objetivos — y luego hacerles seguimiento — el retail podría ser un contribuyente real a los ingresos del grupo."],
      ["Recibo informes semanales de cada gerente. Me lleva un par de horas cada semana leerlos y compararlos. Los formatos no son consistentes.", "Si quiero comparar el rendimiento entre sedes tengo que armar mi propia hoja de cálculo. Lo hago mensualmente pero siempre está ligeramente desactualizada cuando termino.", "He tomado decisiones con datos incompletos. Moví recursos a una sede que pensé que iba mal — resulta que estaba teniendo su mejor mes.", "Si pudiera abrir una pantalla y ver las tres sedes lado a lado — ingresos, ocupación, rendimiento del equipo — actualizado diariamente, podría dirigir esto como un grupo de verdad."]
    ],
    solo: [
      ["Boca a boca sobre todo. También consigo bastante por Instagram — publico con frecuencia y recibo consultas pero es inconsistente.", "La inconsistencia es el problema. No puedo predecir qué semanas serán tranquilas. Y me siento raro haciendo posts promocionales — no va conmigo.", "Una semana tranquila son unos 400€ menos que una semana llena. Cuando pasa dos o tres veces al mes empiezo a estresarme con los costes fijos — mi alquiler, productos, herramientas.", "Si tuviera un flujo más estable que no dependiera de que yo publique o de que alguien me recomiende — podría relajarme y centrarme en el trabajo que me apasiona."],
      ["La gente me escribe por Instagram sobre todo, o me envían mensajes a mi número personal. Intento responder rápido pero cuando estoy con un tinte o un corte se me escapan.", "Sé que pierdo gente cuando tardo en responder. He tenido personas que escriben y cuando respondo una hora después ya reservaron en otro sitio.", "Si pierdo dos o tres reservas a la semana así — a mi precio medio son unos 150 a 200€ semanales que simplemente desaparecen.", "Si la gente pudiera reservar sola cuando quiera — sin esperar a que yo responda — llenaría muchos más huecos, especialmente los de última hora."],
      ["No tengo una política formal realmente. Pido anticipo para servicios grandes como extensiones pero para un corte normal se siente excesivo.", "He tenido incomparecencias en citas de color donde ya había mezclado el producto. Son dos horas de mi tiempo y 20€ en producto que simplemente se perdieron.", "Una incomparecencia de color son unos 80 a 100€ perdidos incluyendo el desperdicio de producto. Incluso una al mes es dinero que no me puedo permitir perder siendo independiente.", "Si todo el mundo pusiera una tarjeta al reservar — creo que ya es normal hoy en día. No se sentiría agresivo, simplemente protegería mi tiempo."],
      ["Mis días fuertes son de jueves a sábado. Lunes y miércoles van según el día. Me encantaría más consistencia.", "Cuando estoy tranquilo un lunes no puedo recuperar ese tiempo. Mi alquiler es el mismo tenga dos clientes u ocho.", "Un lunes tranquilo me cuesta unos 150€ que no voy a recuperar. En el mes es una mella importante en lo que me llevo a casa.", "Si pudiera mover algunas de esas solicitudes de fin de semana a entre semana — ofrecerles disponibilidad cuando estoy libre — suavizaría toda la semana."],
      ["Intento reagendar al final de cada visita pero a veces voy con retraso y el cliente tiene prisa. Se pierde.", "No hago seguimiento. Tengo habituales que se han ido perdiendo y solo me di cuenta cuando noté que su nombre no aparecía en meses.", "Un habitual de cada seis semanas vale unos 500€ al año para mí. Perder dos o tres de esos suma — es el tipo de pérdida que se te acumula sin que te des cuenta.", "Si hubiera un empujoncito automático — algo personalizado, no spam — que hiciera volver a la gente, apenas tendría que pensarlo."],
      ["Cobro con tarjeta con un lector portátil y a veces en efectivo. Hago un total rápido al final del día.", "Normalmente va bien pero he tenido problemas con clientes que quieren dividir pagos o no traen tarjeta. Crea un momento incómodo.", "No es un gran coste de tiempo para mí pero suma. Quizás una hora a la semana gestionando pagos, revisando recibos, registrando cosas.", "Si el pago ocurriera automáticamente y no tuviera que pensar en ello — sería una cosa menos en mi plato. Cada minuto de administración ahorrado cuenta cuando eres solo."],
      ["Soy solo yo así que el equipo no es el tema — pero trabajo con un aprendiz un día a la semana y organizarlo es más administración de lo que debería.", "Lo del aprendiz significa que tengo que registrar sus horas, revisar lo que hizo, asegurarme de cumplir los requisitos de formación. Es encima de todo lo demás.", "Probablemente una hora a la semana en administración del aprendiz — no suena a mucho pero cuando cada hora podría ser un cliente que paga, suma.", "Si esa administración simplemente se gestionara sola — registro automático, fácil de revisar — podría usar esa hora en lo que realmente sé hacer."],
      ["Vendo algunos productos — principalmente lo que uso con los clientes. Los menciono si creo que les ayudaría pero no presiono.", "A veces se me olvida mencionar productos al final del servicio porque estoy concentrado en terminar bien y el cliente tiene prisa. El momento pasa.", "Probablemente menciono productos a un tercio de los clientes. Si los otros dos tercios escucharan sobre el producto adecuado — incluso si la mitad comprara — sería un aporte significativo a mi ingreso mensual.", "Si hubiera una forma natural de hacer la recomendación de producto parte del servicio — no ventas agresivas, solo útil — sería mucho más consistente."],
      ["Reviso lo que gané al final de cada día y eso es todo. Hago un recuento al final del mes para impuestos pero es más necesidad que análisis.", "No tengo idea de qué servicios me generan más por hora, ni qué días son más rentables. Solo intento mantenerme ocupado y espero que cuadre.", "Cobré de menos por un servicio durante un año entero porque nunca analicé bien mi tiempo. Cuando lo calculé estaba ganando menos por hora en ese servicio que en cualquier otro.", "Si pudiera ver de un vistazo — este servicio es tu mejor generador, este día es tu más eficiente — tomaría mejores decisiones sobre qué aceptar y qué cobrar."]
    ],
    spa: [
      ["Tenemos web con reserva online y estamos en un par de directorios. Llegan reservas pero tenemos parches vacíos entre semana que me gustaría llenar.", "Entre semana es consistentemente tranquilo. Estamos casi llenos de viernes a domingo pero lunes, martes, miércoles — especialmente por las mañanas — escasea.", "Una sala de tratamiento vacía entre semana — si debería generar 300€ al día y hace 80€ — en un mes son miles. Y mis gastos fijos no paran los días tranquilos.", "Si pudiera lanzar ofertas de última hora específicas o llenar los huecos entre semana a través de un marketplace sin devaluar la experiencia — eso transformaría el flujo de caja."],
      ["Recibimos llamadas y consultas online. La reserva online funciona bien para tratamientos regulares pero para paquetes o experiencias a medida la gente tiende a llamar y perdemos algunas.", "Las llamadas que entran durante tratamientos van al buzón. Devolvemos la llamada pero para entonces — especialmente para regalos — suelen haberse ido a otro sitio.", "Las reservas de regalo son de alto valor — media de 120€ — y estacionales. Si perdemos cinco al mes en noviembre y diciembre son 600 a 1.200€ de ingresos por regalos.", "Si las consultas pudieran convertir en un proceso online — incluso para paquetes a medida — sin necesitar devolución de llamada, captaríamos muchas más reservas estacionales."],
      ["Tomamos anticipos para paquetes pero no para tratamientos individuales. Las incomparecencias en tratamientos individuales sí ocurren y no siempre podemos recuperar la sala.", "Cancelaciones del mismo día en una sala de tratamiento significan que esa sala no genera nada para ese turno. No podemos llenarla con alguien sin cita como haría un salón.", "Una sala de tratamiento de 60 minutos vacía nos cuesta no solo los ingresos sino también el tiempo del terapeuta, el producto usado en preparación, los gastos generales. Es más caro de lo que parece.", "Si los anticipos fueran estándar para todas las reservas — incluso pequeñas para tratamientos individuales — creo que el comportamiento de cancelación cambiaría."],
      ["Somos buenos llenando los períodos fuertes. El reto es el tiempo de los terapeutas entre citas — los huecos de 20 minutos donde solo esperan.", "Tenemos muchos micro-huecos — 15 a 30 minutos entre tratamientos — que no caben un servicio completo. Los terapeutas están en nómina pero no generan.", "Si tengo cuatro terapeutas con 30 minutos de tiempo muerto cada uno — son dos horas de mano de obra pagada sin producir nada. Diariamente pueden ser 100 a 150€ de coste desperdiciado.", "Si pudiéramos ofrecer tratamientos exprés, masajes de cuero cabelludo, tratamientos de manos — algo que quepa en los huecos — convertiríamos tiempo muerto en ingresos."],
      ["Pedimos a los clientes que reagenden en recepción. Algunos lo hacen, muchos dicen que llamarán. No tenemos seguimiento automático.", "Tenemos muchos clientes que vienen para un cumpleaños o experiencia de regalo y nunca vuelven — aunque les encantó. No hacemos nada para traerlos de vuelta.", "Un cliente nuevo que tuvo una gran experiencia — si convirtiéramos aunque sea un tercio en una segunda visita es un aumento significativo de ingresos sin coste de adquisición.", "Si los clientes nuevos recibieran un seguimiento automático — un agradecimiento y una oferta para reagendar — en 48 horas, creo que un número significativo volvería."],
      ["Pagos con tarjeta en recepción, algunos paquetes prepagados. Al final del día la caja tiene que cuadrar con las reservas y lleva un rato.", "Los paquetes prepagados crean complejidad de seguimiento — saber qué se ha usado, qué queda pendiente. Lo hacemos en hoja de cálculo y ha salido mal antes.", "Cuando el seguimiento de paquetes falla — el cliente dice que le quedan dos sesiones, nosotros tenemos una — alguien tiene que ceder. Daña la confianza.", "Si el uso de paquetes se rastreara solo y el cliente pudiera ver su saldo — menos disputas, menos administración, y los clientes confiarían en que lo tenemos controlado."],
      ["Tengo siete terapeutas con diferentes especialidades. El horario es complejo — emparejar habilidad con solicitud, gestionar asignación de salas, rastrear horas.", "Cuando recibo una reserva de última hora para un tratamiento específico tengo que verificar manualmente quién está capacitado, quién está libre y qué sala está preparada.", "Diez minutos por reserva compleja — si tengo diez de esas al día, es hora y media de pura administración. Y aún cometo errores a veces.", "Si el sistema conociera las cualificaciones de cada terapeuta, su disponibilidad y los requisitos de sala y pudiera emparejarlos automáticamente — recuperaría tiempo y los clientes recibirían confirmación más rápido."],
      ["Tenemos zona de retail con productos profesionales y cuidado posterior. Los terapeutas recomiendan al final del tratamiento pero es inconsistente.", "La recomendación ocurre quizás la mitad de las veces. Después de un masaje profundo el cliente está relajado y dudamos en empujar retail — pero en realidad el momento es perfecto.", "Si a cada cliente post-tratamiento se le ofreciera el producto de cuidado adecuado — incluso con 20% de conversión a nuestro precio medio de 35€ — en 200 tratamientos al mes son 1.400€ que no estamos generando.", "Si el retail se posicionara como continuación del cuidado en vez de ventas — el producto correcto, bien presentado, ofrecido siempre — creo que los clientes lo agradecerían."],
      ["Reviso cifras semanales el sábado. Miro ingresos, número de tratamientos, transacción media. No tengo buena visibilidad de ocupación de salas ni productividad de terapeutas.", "Quiero saber qué terapeutas son más productivos y qué tratamientos tienen mejor margen — pero sacarlo del sistema actual lleva tiempo que no siempre tengo.", "Tomé la decisión de invertir en formación para un nuevo tratamiento basándome en intuición. Seis meses después está por debajo de lo esperado.", "Si pudiera ver productividad de terapeutas, margen de tratamiento y ocupación de salas en un solo panel — podría invertir en formación y equipamiento con mucha más confianza."]
    ],
    barber: [
      ["Principalmente los que pasan y boca a boca. Tenemos algunos habituales que reservan pero la mayoría simplemente entra. Sábado ocupado, lunes y martes tranquilos.", "El modelo sin cita funciona pero significa que no puedo planificar la semana. Nunca sé si el lunes será muerto o decente.", "Un lunes muerto con dos barberos — estoy pagando sueldos por tiempo muerto. Si no llegan clientes puedo hacer 200€ en caja contra 180€ de coste de personal. Eso no es negocio.", "Si pudiera mover siquiera el 30% de los clientes a reserva previa — ingresos predecibles, mejor dotación de personal — el negocio se sentiría mucho más estable."],
      ["Entran sin cita, llaman, y algunos escriben por DM. Los DMs se me dan fatal — llegan cuando estoy cortando y para cuando los veo la persona ya se fue.", "Los DMs de Instagram son lo peor — sé que pierdo reservas ahí. La gente pregunta si estamos llenos, no respondo en una hora, pasan por delante y ven la cola y se van.", "Calculo que pierdo cinco o seis reservas a la semana por respuestas lentas. A mis precios son 150 a 200€ semanales.", "Si los clientes pudieran ver nuestra disponibilidad en directo y reservar online — especialmente los que no quieren entrar y esperar cola — captaríamos todo un segmento que nos falta."],
      ["Las reservas son bastante informales — la gente reserva por mensaje o llamada y saben que pueden cancelar sin problema. Siempre hemos sido relajados.", "Las incomparecencias en turnos reservados molestan porque he rechazado a gente sin cita para ese turno. Especialmente un sábado ocupado — pierdo un cliente garantizado.", "Un sábado un turno perdido puede costarme un corte y una barba — 45 a 55€. Y le dije a alguien sin cita que volviera y se fue a otro. Es doble pérdida.", "Incluso solo un recordatorio el día anterior probablemente reduciría mucho las incomparecencias. La mayoría no son malintencionados — simplemente se olvidan."],
      ["Los sábados son sólidos pero de lunes a miércoles es impredecible. Tengo personal para el nivel de fin de semana y arrastro ese coste los días flojos.", "Mi segundo barbero está infrautilizado martes y miércoles. Es bueno — no quiero recortarle horas — pero el trabajo no justifica que esté a tiempo completo esos días.", "Tener un barbero al 50% de utilización dos días a la semana — son unos 200€ semanales en sueldos sin respaldo de ingresos. En el año es significativo.", "Si pudiera dirigir reservas específicamente a esos turnos de entre semana — algo como descuento de fidelidad entre semana — podría justificar mantener al equipo sin el tiempo muerto."],
      ["Los habituales simplemente vuelven — conocen su ritmo. Pero tengo clientes que no he visto en meses y no tengo forma de contactarles.", "No tengo sistema para rastrear quién ha venido. Algunos vienen cada tres semanas, otros cada tres meses. No puedo distinguir hasta que los veo entrar.", "Un habitual con ciclo de seis semanas vale unos 600 a 800€ al año. Cuando se pierden — quizás se mudaron, quizás probaron otro sitio — ni me entero hasta un año después.", "Si hubiera forma de avisar automáticamente a clientes perdidos — incluso solo un 'hace tiempo que no te vemos' — probablemente recuperaría a algunos sin hacer nada yo."],
      ["Efectivo y tarjeta. Al final del día se suma todo pero es bastante manual. Uso una app básica pero no conecta con nada.", "Pago a los barberos parcialmente por comisión y calcular lo que se debe a cada uno al final de la semana me lleva una hora con hoja de cálculo.", "Esa hora cada semana son 52 horas al año en administración de comisiones. Y he cometido errores que han causado roces con el equipo.", "Si la comisión se rastreara automáticamente según lo que hizo cada barbero — yo lo vería en tiempo real y ellos también — no habría disputas y recuperaría esa hora cada semana."],
      ["Tengo tres barberos y yo hago el horario. WhatsApp para cambios de turno. Funciona pero es caótico cuando alguien llama enfermo.", "Cuando alguien está enfermo estoy enviando mensajes buscando cobertura, avisando a clientes, gestionando la cola. Todo a la vez.", "Un día de baja en la silla me cuesta los ingresos de esa silla — unos 250 a 300€ — más el estrés de gestionarlo. Y si no consigo cobertura, los clientes que esperan se van.", "Si cambios de turno, solicitudes de cobertura y avisos a clientes pudieran pasar por un solo lugar — menos caos, menos estrés, menos probabilidad de que los clientes se vayan."],
      ["Tenemos algunos productos de barbería — pomada, cera, aceite de barba. Los barberos los mencionan ocasionalmente pero no hay un enfoque real.", "Depende del barbero. Uno de mis chicos es genial — recomienda algo a casi cada cliente y compran. Los otros apenas lo mencionan.", "La diferencia entre mi mejor y peor vendedor de producto son unos 150 a 200€ al mes. Si pudiera llevar a todos al nivel del mejor eso es dinero real.", "Si recomendar el producto adecuado fuera simplemente parte del servicio — natural, sin presión — y todos lo hicieran, el retail podría ser una segunda línea de ingresos real."],
      ["Al final del día sé lo que hemos cobrado. Semanalmente tengo una vista aproximada. Más allá no analizo mucho — me guío por instinto.", "No rastreo qué servicios son más rentables ni qué barbero tiene mejor tasa de repetición. Me gustaría pero no tengo forma fácil de verlo.", "Mantuve un servicio en el menú dos años que no daba dinero realmente porque nunca revisé los números. Cuando lo hice lo quité y nadie lo notó.", "Si pudiera ver semanalmente: ingresos por barbero, mejores servicios, turnos más vacíos — dirigiría el negocio en vez de solo estar en él."]

  ar: {
    salon: [
      ["أغلب عملائنا الجدد يجون عن طريق التوصيات — شخص يوصي فيهم عميل حالي. ننشر شوي بالإنستغرام بس ما أقدر أقول لك إذا فعلاً يجيب أحد.", "موضوع الإنستغرام هو المشكلة — أنشر لما أتذكر وما هو بشكل منتظم. وما عندي فكرة كيف أطلع بقوقل صح. أعرف إننا نفقد ناس هناك.", "بصراحة؟ أكثر مما أحب أعترف. لو يوم ثلاثاء هادي واحد صار يوم كامل، يمكن 300 جنيه ما أشوفها. اضربها بالشهر وتلاقيها تتراكم.", "لو عندي تدفق ثابت بدون ما يعتمد كل شيء على إني أنشر أو شخص يصادف يذكرنا — هذا بيشيل عني ضغط كبير. أقدر أركّز على شغلي."],
      ["يتّصلون، يرسلون لنا رسائل بالإنستغرام، بعضهم يلقونا بقوقل. الموضوع عشوائي شوي الصراحة.", "الرسائل هي الأسوأ. أشوفها وأنا مع عميل ولما أرد يكونون راحوا لمكان ثاني. أكيد خسرت حجوزات كذا.", "ما أعرف الرقم بالضبط بس يضايقني. حتى لو اثنين أو ثلاثة بالأسبوع يفلتون — هذا جزء كويّس من الإيراد يمشي من الباب.", "لو أي شخص يقدر يبحث عنّا ويحجز فوراً بدون ما ينتظر ردّي — هذا بيكون شيء كبير. نصف رسائلي ناس تسأل إذا فاضيين السبت."],
      ["نطلب عربون من العملاء الجدد بس الصراحة مو منتظمين فيه. الدائمين نثق فيهم وما دائماً ينفع.", "الإلغاءات المتأخرة هي اللي تقتل. شخص يرسل الساعة 8 يقول ما يقدر يجي الساعة 10 — مافيه طريقة أعبّي الموعد. يروح كذا.", "الغياب يكلّفني قيمة الموعد زائد إني رفضت ناس ثانية لذاك الوقت. في أسبوع سيّئ يمكن 150، 200 جنيه تروح. محبط أكثر من أي شيء.", "لو أقدر على الأقل أحفظ بطاقة — عشان الناس تفكّر مرتين قبل ما تلغي بآخر لحظة — هذا بيغيّر الأمور."],
      ["السبت مزدحم، الاثنين والثلاثاء متذبذبين. جرّبت عروض للأيام الهادية بس ما تحرّك شيء كثير.", "فترة الغداء يوم الثلاثاء تقريباً دائماً فاضية. وأخصائيتي الجديدة كثير تكون تنتظر بينما الأقدم محجوزة بالكامل.", "ثلاثاء هادي يكلّف تقريباً 200 جنيه مقارنة بيوم كامل. في شهر من ثلاثاءات هادية نتكلم عن ألف تقريباً ما أجنيها.", "لو أقدر أخلّي الثلاثاء يشبه السبت — حتى 70% منه — أقدر أبرّر إني أخلّي الجديدة بدوام كامل."],
      ["نحاول نعيد الحجز بنهاية الموعد بس متذبذب. بعض العملاء يحجزون فوراً، ثانيين يقولون بنتّصل وما نسمع منهم.", "ما فيه نظام متابعة. لو عميل دائم ما جا لثمان أسابيع ما بعرف إلا إذا صدفة تذكّرته.", "خسارة عميل دائم يجي كل ستة أسابيع — يمكن 400 إلى 500 جنيه بالسنة تمشي من الباب. وعادةً ما تلاحظ إلا لما يفوت الأوان.", "لو العملاء يوصلهم تذكير تلقائي — شيء يقول 'صار لك فترة، تبي تحجز؟' — غالباً بسترجع نصفهم بدون ما أسوّي شيء."],
      ["جهاز بطاقات، كاش، أحياناً تحويل بنكي للأشغال الكبيرة. آخر اليوم أطابق يدوياً.", "التحويلات هي المشكلة — العملاء أحياناً ينسون، لازم ألاحقهم، يحسّسني بإحراج. والمطابقة تاخذ نص ساعة كل مسا.", "نص ساعة باليوم، خمس أيام بالأسبوع — ساعتين ونص إدارة أسبوعياً فقط على المدفوعات.", "لو كل شيء يدخل من مكان واحد والأرقام تطابق لحالها آخر اليوم — ما أقدر أوصف لك كم بيكون الإقفال أهدأ."],
      ["عندي ثلاث أخصائيات والجدول نسوّيه بقروب واتساب. أغلب الوقت ينفع بس يصير فوضى لما أحد يبي يوم إجازة أو يبدّل شفت.", "لما أحد يمرض القروب يجن. نص الوقت العملاء ما يعرفون إلا لما يوصلون. محرج.", "العمولات أسوّيها بجدول آخر الشهر. تاخذ ثلاث ساعات تقريباً وعندي خلافين السنة الماضية على الأرقام.", "لو الفريق يقدرون يشوفون جدولهم وعمولاتهم بالوقت الحقيقي — أسئلة أقل لي، فوضى واتساب أقل. أقدر أدير بدل ما أطفئ حرايق."],
      ["عندنا بعض منتجات العناية، أغلبها العلامات اللي نستخدمها. الأخصائيات يذكرونها أحياناً بس ما فيه نهج حقيقي.", "يعتمد كلّه على مين يخدم العميل. بعض فريقي ممتازين بالتوصية، ثانيين ما يذكرونها أبداً. ونفذ المخزون كم مرة وهذا يبيّن سيّئ.", "أفضل أخصائية عندي في البيع تسوّي أربع خمس أضعاف الباقين. هذي الفجوة هامش ضائع كل أسبوع.", "لو التوصية بالمنتج صارت جزء طبيعي من محادثة الخدمة — مو بيع ضاغط، بس جزء مما نسوّيه — أعتقد البيع بالتجزئة يقدر يصير مصدر دخل حقيقي."],
      ["أتفقّد الكاش آخر اليوم وعندي فكرة تقريبية عن الأسبوع. شهرياً أجمعها بجدول عشان أشوف وين إحنا.", "لو أبي أعرف أي أخصائية أداؤها الأفضل أو أي خدمات الأكثر شعبية لازم أحفر بالجدول يدوياً. ما أسوّيها بالقدر اللي المفروض.", "السنة الماضية قرّرت أشيل خدمة لأني ظنيتها مو مربحة. طلع كنت غلطان — كانت شعبية بس كنت أتطلّع على الأرقام الغلط.", "لو أقدر أفتح شيء وأشوف بالضبط من وين يجي الفلوس، أي أيام وأي موظفين — بآخذ قرارات أحسن. الحين أغلبها حدس."]

    multi: [
      ["كل فرع يسوّي شغله — واحد بقوقل، واحد يعتمد على اللي يمرّون. ما فيه نهج موحّد على مستوى المجموعة.", "عدم الاتساق هو المشكلة. فرع دائماً مشغول، الثانيين متذبذبين وما أقدر أقول لك ليش.", "فرع هادي يكلّفني بالمصاريف الثابتة — إيجار، رواتب — مقابل دخل أقل. عندي فرع يكلّفني 4,000 شهرياً ويدخّل 5,000. هذا ضيّق جداً.", "لو أقدر أشوف شو ناجح بالفرع المشغول وأنسخه بالباقي — هذا بيسوى كثير. الحين كلّه تخمين."],
      ["كل فرع عنده رقم حجز خاص وبعضهم عندهم حجز أونلاين وبعضهم لا. مو منتظم أبداً.", "الفروع بدون حجز أونلاين تخسر استفسارات بعد ساعات العمل. الناس يبحثون عنّا الساعة 9 بالليل، ما يقدرون يحجزون، يروحون لغيرنا.", "لو فرع واحد بس يخسر خمس حجوزات بالأسبوع بعد الساعات هذي 500 أسبوعياً. على ثلاث فروع يصير رقم حقيقي.", "لو الثلاث فروع عندهم نفس تجربة الحجز السلسة أقدر أطلق حملة تسويق حقيقية وأعرف إنها بتحوّل."],
      ["السياسة تختلف بين الفروع — مدير صارم وآخر أكثر مرونة. ما فيه معيار على مستوى المجموعة.", "اكتشفت الشهر الماضي إن فرع عندي 20% نسبة غياب من العملاء الجدد. المدير ما قالي.", "20% غياب من عملاء جدد بذاك الفرع — واحد من كل خمس مواعيد يروح كذا. بمتوسط السعر ممكن أربع خمس آلاف شهرياً.", "لو أقدر أحط السياسة مرة وتنطبق على الثلاث فروع تلقائياً — بدون استثناءات عربون، بدون موظفين ياخذون قرارات ما تخصّهم — هذا بيغيّر كل شيء."],
      ["السبت قوي بكل الفروع. وسط الأسبوع يتفاوت. ما عندي رؤية لنسبة الإشغال بكل فرع بدون ما أطلب من كل مدير يطلّع أرقام.", "أعتقد عندي موظفين بأوقات هادية ببعض الفروع بس ما أقدر أشوفها من هنا. لما أعرف يكون التكلفة صارت.", "لو فرع يشتغل بنسبة 50% يوم الأربعاء — هذي رواتب ميتة مقابل كراسي فاضية. تقريباً 300-400 تكلفة عمالة بدون عائد.", "لو أقدر أشوف الإشغال بكل فرع ويوم وأخصائي بالوقت الحقيقي — أقدر أدير هذا بدل ما أتفاعل بس."],
      ["كل فرع يسوّيها بطريقته. بعضهم يعيدون الحجز بالكرسي، بعضهم يرسلون رسالة. ما فيه معيار.", "عملاء يزورون فرع وبعدين ينتقلون — ممكن يكونون قريبين من فرع ثاني بس ما عندنا طريقة نعرف أو نتواصل معهم.", "عميل يزور شهرياً طول حياته يسوى آلاف للمجموعة. لما يتوقف — حتى على مستوى كل فروعنا — ما عندنا رؤية إنه صار.", "قاعدة بيانات عملاء مشتركة بين الثلاث فروع عشان أي فرع يقدر يشوف التاريخ ويتواصل — هذا بيخلّينا نحس كمجموعة فعلاً."],
      ["كل فرع عنده نظام كاش مختلف. المطابقة يسوّيها كل مدير لوحده ويرسلها لي أسبوعياً.", "تجميع الثلاث تقارير ياخذ مني أو من مساعدي نص يوم كل أسبوع. والصيغ كلها مختلفة.", "نص يوم بالأسبوع = 26 يوم بالسنة من وقت شخص. بالراتب بسهولة 3,000 إلى 4,000 سنوياً فقط بالمطابقة.", "لو عندي لوحة واحدة تبيّن لي شو دخل بالثلاث فروع أمس — أقدر ألاحظ المشاكل فوراً بدل ما أعرف بعد أسبوع."],
      ["المدراء يتعاملون مع جداولهم وأنا أثق فيهم. بس صار عندي مواقف اكتشفت بعدها إن التغطية ما تنظّمت صح.", "ما أقدر أشوف أداء الموظفين الأفراد بين الفروع بدون ما أطلب من المدراء يرسلون بيانات. وما دائماً يقدّمونها بنفس الطريقة.", "رقّيت شخص السنة الماضية ظنّيته أداؤه قوي. طلع أرقامه متوسطة — بس ما كنت شايف بيانات الفروع الثانية بوضوح.", "لو أقدر أشوف أداء كل عضو فريق بكل الفروع بعرض واحد — مو بس الإيراد بل الإشغال والاحتفاظ والالتزام — بأدير المجموعة بثقة أكبر."],
      ["البيع بالتجزئة متروك للمدراء الأفراد. فرع يسوّيها زين، الباقي مو كثير.", "ما أقدر أشوف أداء التجزئة بكل فرع بسهولة. أعتقد فرع بالكاد يبيع بس ما عندي بيانات أتحدّاه فيها.", "لو أفضل فرع تجزئة يسوّي 800 شهرياً والباقي 200 — هذي 1,200 شهرياً المفروض أجنيها وما أجنيها. 14,000 بالسنة.", "لو أقدر أقارن أداء التجزئة فرع بفرع وأحط أهداف — وبعدين أتابعها — التجزئة تقدر تصير مساهم حقيقي لإيرادات المجموعة."],
      ["أستلم تقارير أسبوعية من كل مدير. تاخذ ساعتين كل أسبوع أقرأها وأقارنها. الصيغ مو متسقة.", "لو أبي أقارن الأداء بين الفروع لازم أبني جدولي الخاص. أسوّيها شهرياً بس دائماً تكون متأخرة شوي لما أخلّص.", "أكيد اتّخذت قرارات ببيانات ناقصة. نقلت موارد لفرع ظنّيته يعاني — طلع كان يعيش أفضل شهر له.", "لو أقدر أفتح شاشة واحدة وأشوف الثلاث فروع جنب بعض — إيرادات، إشغال، أداء الفريق — محدّث يومياً، أقدر أدير هذا كمجموعة فعلاً."]

      ["أيامي القوية من الخميس للسبت. الاثنين والأربعاء حسب اليوم. أتمنى اتساق أكثر.", "لما أكون هادي يوم اثنين ما أقدر أعوّض الوقت. إيجاري نفسه سواء عندي عميلين أو ثمانية.", "اثنين هادي يكلّفني تقريباً 150 ما بشوفها ثاني. بالشهر هذي خصم مهم من اللي آخذه.", "لو أقدر أحوّل بعض طلبات نهاية الأسبوع لوسط الأسبوع — أعرض لهم أوقات فاضية — بينعّم الأسبوع كله."],

// ANALYSIS (stays English-based internally, feedback is localised)
// ════════════════════════════════════════════════════════════
function analyseQuestion(raw) {
  if (!raw || raw.trim().length < 2) return null;
  const q = raw.trim();
  const t = q.toLowerCase();
  const words = t.split(/\s+/);
  const wc = words.length;

  const isStatement = !q.includes("?") && !q.includes("؟") && !t.match(/^(walk|tell|describe|explain|help me|share|talk me|cuéntame|dime|explica|أخبرني|وصف)/);
  const hasQ = q.includes("?") || q.includes("؟");
  const closedOpeners = /^(do you|did you|have you|has your|is your|are you|was your|were you|can you|could you|would you|will you|do they|did they|have they|has the|is the|are the|do most|did most|¿tienes|¿es|¿haces|¿puedes|¿está|¿son|¿hay|هل )/;
  const isClosed = closedOpeners.test(t);
  const leadingPatterns = [
    /^(so you|so you're|so your|so basically|so it sounds|i imagine|i assume|i bet|i guess|you must|you probably|you likely|that must|that sounds like|sounds like you|it sounds like|i'm sure|clearly|obviously|no doubt|entonces tú|supongo|imagino|apuesto|seguramente|أنا أتخيّل|لابد|أكيد)/,
    /(don't you think|right\?$|isn't it\?$|wouldn't you say|you'd agree|surely|¿no crees|¿verdad|¿no\?$|أليس كذلك|صح\؟)/,
    /(must be (hard|difficult|frustrating|a pain|tough|stressful)|debe ser (difícil|frustrante|duro)|لابد (صعب|محبط))/,
    /(bet that('s| is) (annoying|frustrating|hard|difficult))/
  ];
  const isLeading = leadingPatterns.some(p => p.test(t));
  const pitchPatterns = [
    /(fresha|our (platform|system|software|tool|product)|we (can|could|would)|have you (heard|tried|seen|considered|thought about) (fresha|us|our))/,
    /(nuestra (plataforma|sistema)|podemos|منصتنا|نظامنا|نقدر)/,
    /(what if i told you|what if we could|imagine if|how would.*feel if we)/,
    /(our (clients|customers) (typically|usually|often|find|see|get))/
  ];
  const isPitching = pitchPatterns.some(p => p.test(t));
  const vaguePatterns = [
    /^(how('s| is) (that|it|business|everything|things) (going|working|been)\??$)/,
    /^(tell me about your business\.?\??$)/,
    /^(what('s| is) your (biggest|main|number one) (challenge|problem|issue|pain point)\??$)/,
    /^(¿cuál es tu mayor (reto|problema|desafío)\??$)/,
    /^(شو أكبر تحدّي عندك\؟?$)/
  ];
  const isVague = vaguePatterns.some(p => p.test(t)) || (wc <= 4 && hasQ);
  const tooShort = wc < 5;
  const questionMarks = (q.match(/[\?؟]/g) || []).length;
  const isMulti = questionMarks >= 2;
  const selfAnswers = [
    /(or (is it|do you|are you|would you|have you)|or (maybe|perhaps|possibly) (you|it|they).*\?)/,
    /(\?.*\bor\b.*\?)/,
    /(أو|o ¿)/
  ];
  const selfAnswering = selfAnswers.some(p => p.test(t));
  const openOpeners = /^(walk me|tell me (how|what|about|more)|how (do you|does|did|would|are)|what (does|do|did|would|is|are|happens)|where (does|do|did|are)|when (does|do|did)|why (do|does|did)|describe|explain|help me understand|talk me through|cuéntame|dime|cómo|qué|dónde|cuándo|por qué|أخبرني|كيف|شو|وين|متى|ليش)/;
  const isOpen = openOpeners.test(t);
  const gapWords = /(impact|cost|affect|mean|change|different|better|ideal|vision|imagine|result|consequence|lose|lost|miss|gap|struggle|challenge|difficult|break|slip|drain|hurt|waste|bleed|impacto|coste|cuesta|pierde|perdido|brecha|dolor|lucha|تأثير|تكلفة|يكلّف|خسارة|فجوة|ألم)/;
  const hasGapLanguage = gapWords.test(t);
  const storyInvite = /(walk me through|talk me through|describe what|tell me more|what does that look like|give me an example|cuéntame cómo|descríbeme|أخبرني كيف|وصف لي)/;
  const invitesStory = storyInvite.test(t);
  const quantify = /(how much|how many|what does that cost|put a number|in real terms|per (week|month|year|day)|cuánto|por (semana|mes|año)|كم|بالأسبوع|بالشهر|بالسنة)/;
  const asksForNumber = quantify.test(t);

  let open = 5;
  if (isOpen) open += 3;
  if (invitesStory) open += 1;
  if (isClosed) open -= 3;
  if (isVague) open -= 1;
  if (isMulti) open -= 1;
  if (tooShort) open -= 2;
  open = Math.max(1, Math.min(10, open));

  let gap = 4;
  if (isOpen) gap += 1;
  if (hasGapLanguage) gap += 3;
  if (asksForNumber) gap += 2;
  if (invitesStory) gap += 1;
  if (isPitching) gap -= 4;
  if (isLeading) gap -= 2;
  if (isVague) gap -= 2;
  if (isClosed) gap -= 1;
  gap = Math.max(1, Math.min(10, gap));

  let lead = 2;
  if (isLeading) lead += 5;
  if (isPitching) lead += 4;
  if (selfAnswering) lead += 2;
  if (isClosed) lead += 1;
  if (isOpen && !isLeading) lead -= 1;
  lead = Math.max(1, Math.min(10, lead));

  const ui = L();
  let issues = [];
  let fb = "";

  if (tooShort && !isOpen) issues.push(ui.fbTooShort);
  if (isStatement) issues.push(ui.fbStatement);
  if (isPitching) issues.push(ui.fbPitching);
  if (isLeading) issues.push(ui.fbLeading);
  if (isClosed) issues.push(ui.fbClosed);
  if (isVague) issues.push(ui.fbVague);
  if (isMulti) issues.push(ui.fbMulti);
  if (selfAnswering) issues.push(ui.fbSelfAns);

  if (issues.length === 0) {
    if (asksForNumber && hasGapLanguage) fb = ui.fbStrongBoth;
    else if (invitesStory) fb = ui.fbStory;
    else if (isOpen && hasGapLanguage) fb = ui.fbOpenGap;
    else if (isOpen) fb = ui.fbOpenBasic;
    else fb = ui.fbDefault;
  } else {
    fb = issues[0];
    if (issues.length > 1 && (isPitching || isLeading || isClosed)) {
      fb += " " + ui.fbAlso + issues[1];
    }
  }

  return { gap, open, lead, fb, issueCount: issues.length };
}

  const modelQ = MODEL_QS_I18N[currentLang][topicIdx][i];

  const gc = scoreColor(result.gap), oc = scoreColor(result.open);
  const lc = scoreColor(11-result.lead);
  const ll = ui.leadLabels(result.lead);

  const fb = document.getElementById(`qfb-${i}`);
  if (!fb) return;
  fb.className = "q-fb show";
  fb.innerHTML = `
    <div class="fb-scores">
      <span class="fb-chip" style="color:${gc};border-color:${gc}">${ui.gap} ${result.gap}/10</span>
      <span class="fb-chip" style="color:${oc};border-color:${oc}">${ui.open} ${result.open}/10</span>
      <span class="fb-chip" style="color:${lc};border-color:${lc}">${ll}</span>
    </div>
    <div class="fb-text">${result.fb}</div>
    <div class="fb-model-box">
      <div class="fb-model-lbl">${ui.strongQ(ui.tLabels[i])}</div>
      <div class="fb-model-q">"${modelQ}"</div>
    </div>`;
}

function renderPractice(){
  const topic = T()[topicIdx];
  const client = C()[clientKey];
  const ui = L();
  const tMeta = [
    {label:ui.tLabels[0],color:"var(--t1)",dim:"var(--t1d)"},
    {label:ui.tLabels[1],color:"var(--t2)",dim:"var(--t2d)"},
    {label:ui.tLabels[2],color:"var(--t3)",dim:"var(--t3d)"},
    {label:ui.tLabels[3],color:"var(--t4)",dim:"var(--t4d)"}
  ];

  if (practicePhase === "setup"){
    return `<div class="content">
      <div class="setup-card">
        <div>
          <div class="setup-title">${ui.practiceLabel}: ${topic.title}</div>
          <div class="setup-sub">${ui.practiceIntro(personaName, personaDisplay(), client.name)}</div>
        </div>
        <button class="start-btn" id="start-btn">${ui.startSession}</button>
      </div>
    </div>`;
  }

  const ftSteps = tMeta.map((tm,i)=>{
    const state = i < practiceStep ? "done" : i === practiceStep ? "active" : "";
    return `<div class="ft-step ${state}">
      <div class="ft-step-lbl" style="color:${tm.color}">${tm.label}</div>
      <div class="ft-step-desc">${ui.tDescs[i]}</div>
    </div>`;
  }).join("");

  const msgs = practiceMessages.map(m => renderMsg(m, tMeta)).join("");

  const micClass = micAvailable ? "mic-btn" : "mic-btn unavailable";
  const inputSection = practicePhase==="active" && practiceStep < 4 ? `
    <div class="input-area">
      <div class="input-head">
        <span class="q-badge" style="background:${tMeta[practiceStep].dim};color:${tMeta[practiceStep].color}">${tMeta[practiceStep].label}</span>
        <span class="q-prompt">${topic.prompts[practiceStep]}</span>
      </div>
      <div class="input-row">
        <button class="${micClass}" id="mic-practice" onclick="toggleMic('practice','practice-input')">🎤</button>
        <textarea class="p-ta" id="practice-input" rows="2" placeholder="${ui.askPlaceholder(tMeta[practiceStep].label)}"></textarea>
        <button class="skip-btn" id="skip-btn">${ui.skip}</button>
        <button class="send-btn" id="send-btn">${ui.send}</button>
      </div>
    </div>` : "";

  const summary = practicePhase==="done" ? renderSummary(topic) : "";

  return `<div class="content" style="padding-bottom:0;display:flex;flex-direction:column;height:100%;overflow:hidden">
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;padding:28px 32px 0">
      <div class="ft-bar">${ftSteps}</div>
      <div class="thread" id="thread">${msgs}${summary}</div>
      ${inputSection}
      <div style="height:24px;flex-shrink:0"></div>
    </div>
  </div>`;
}

function renderMsg(m, tMeta){
  const ui = L();
  if (m.type === "prospect"){
    return `<div class="msg">
      <div class="avatar">💼</div>
      <div class="msg-body">
        <div class="msg-name prospect">${personaName} · ${personaDisplay()}</div>
        <div class="bubble prospect">${esc(m.text)}</div>
      </div>
    </div>`;
  }
  if (m.type === "rep"){
    const tm = tMeta[m.step];
    return `<div class="msg rep">
      <div class="msg-body">
        <div class="bubble rep-bubble" style="border-color:${tm.color}40">
          <div class="rep-t-label" style="color:${tm.color}">${tm.label}</div>
          ${esc(m.text)}
        </div>
      </div>
    </div>`;
  }
  if (m.type === "coach"){
    const r = m.result;
    const gc = scoreColor(r.gap), oc = scoreColor(r.open), lc = scoreColor(11-r.lead);
    const ll = ui.leadLabels(r.lead);
    const modelQ = MODEL_QS_I18N[currentLang][topicIdx][m.step];
    return `<div class="msg">
      <div class="avatar coach">✦</div>
      <div class="msg-body" style="flex:1">
        <div class="msg-name coach">Coach</div>
        <div class="bubble coach">
          <div class="coach-scores">
            <span class="c-chip" style="color:${gc};border-color:${gc}">${ui.gap} ${r.gap}/10</span>
            <span class="c-chip" style="color:${oc};border-color:${oc}">${ui.open} ${r.open}/10</span>
            <span class="c-chip" style="color:${lc};border-color:${lc}">${ll}</span>
          </div>
          <div class="coach-fb">${r.fb}</div>
          <div class="coach-model">
            <div class="coach-model-lbl">${ui.strongQ(ui.tLabels[m.step])}</div>
            <div class="coach-model-q">"${modelQ}"</div>
          </div>
        </div>
      </div>
    </div>`;
  }
  return "";
}

function renderSummary(topic){
  const ui = L();
  const scores = practiceScores;
  if (!scores.length) return "";
  const avgGap  = Math.round(scores.reduce((a,s)=>a+s.gap,0)/scores.length*10)/10;
  const avgOpen = Math.round(scores.reduce((a,s)=>a+s.open,0)/scores.length*10)/10;
  const avgLead = Math.round(scores.reduce((a,s)=>a+s.lead,0)/scores.length*10)/10;
  const gc = scoreColor(avgGap), oc = scoreColor(avgOpen), lc = scoreColor(11-avgLead);
  const ll = avgLead>=7?ui.leadLevels.high:avgLead>=4?ui.leadLevels.med:ui.leadLevels.low;

  let note = "";
  if (avgOpen < 5) note = ui.noteOpen;
  else if (avgLead > 6) note = ui.noteLead;
  else if (avgGap < 5) note = ui.noteGap;
  else note = ui.noteGood;

  return `<div class="summary-card">
    <div class="summary-head">
      <div class="summary-title">${ui.sessionComplete}</div>
      <div class="summary-sub">${topic.title} · ${personaName} · ${personaDisplay()}</div>
    </div>
    <div class="summary-scores">
      <div class="sum-score">
        <div class="sum-val" style="color:${gc}">${avgGap}</div>
        <div class="sum-lbl">${ui.avgGap}</div>
      </div>
      <div class="sum-score">
        <div class="sum-val" style="color:${oc}">${avgOpen}</div>
        <div class="sum-lbl">${ui.avgOpen}</div>
      </div>
      <div class="sum-score">
        <div class="sum-val" style="color:${lc}">${ll}</div>
        <div class="sum-lbl">${ui.leadRisk}</div>
      </div>
    </div>
    <div class="summary-body">
      <div class="sum-fb-title">${ui.coachNote}</div>
      <div class="sum-fb-text">${note}</div>
      <div class="sum-btns">
        <button class="start-btn" id="retry-btn">${ui.tryAgain}</button>
        <button class="start-btn sec" id="next-topic-btn">${ui.nextTopic}</button>
      </div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════════
// EVENTS
// ════════════════════════════════════════════════════════════
function attachEvents(){
  document.querySelectorAll("[data-mode]").forEach(b=>{
    b.onclick = ()=>{ mode=b.dataset.mode; if(mode==="practice") freshPersona(); render(); };
  });
  document.querySelectorAll("[data-client]").forEach(b=>{
    b.onclick = ()=>{ clientKey=b.dataset.client; freshPersona(); resetPractice(); render(); };
  });
  document.querySelectorAll("[data-topic]").forEach(el=>{
    el.onclick = ()=>{ topicIdx=parseInt(el.dataset.topic); buildVals=["","","",""]; resetPractice(); render(); };
  });
  document.querySelectorAll("[data-lang]").forEach(b=>{
    b.onclick = ()=>{
      currentLang = b.dataset.lang;
      buildVals=["","","",""];
      resetPractice();
      render();
    };
  });

  for(let i=0;i<4;i++){
    const ta = document.getElementById(`qta-${i}`);
    if(ta){
      ta.onblur = ()=>{ buildVals[i]=ta.value; showBuildFeedback(i); };
      ta.oninput = ()=>{ buildVals[i]=ta.value; };
    }
  }

  const pb = document.getElementById("print-btn");
  if(pb) pb.onclick = printCard;
  const sb = document.getElementById("start-btn");
  if(sb) sb.onclick = startSession;
  const sendBtn = document.getElementById("send-btn");
  if(sendBtn) sendBtn.onclick = sendQuestion;
  const skipBtn = document.getElementById("skip-btn");
  if(skipBtn) skipBtn.onclick = skipStep;
  const pi = document.getElementById("practice-input");
  if(pi) pi.onkeydown = e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendQuestion();} };
  const retryBtn = document.getElementById("retry-btn");
  if(retryBtn) retryBtn.onclick = ()=>{ resetPractice(); render(); };
  const nextBtn = document.getElementById("next-topic-btn");
  if(nextBtn) nextBtn.onclick = ()=>{ topicIdx=(topicIdx+1)%T().length; resetPractice(); render(); };

  scrollThread();
}

function resetPractice(){
  practicePhase="setup"; practiceStep=0; practiceMessages=[]; practiceScores=[];
  freshPersona();
}

function startSession(){
  practicePhase="active"; practiceStep=0; practiceMessages=[]; practiceScores=[];
  const openings = OPENINGS_I18N[currentLang][persona] || OPENINGS_I18N[currentLang]["Friendly"];
  const opening = pick(openings);
  practiceMessages.push({type:"prospect",text:opening});
  render();
}

function sendQuestion(){
  const pi = document.getElementById("practice-input");
  if(!pi) return;
  const q = pi.value.trim();
  if(!q) return;

  const step = practiceStep;
  practiceMessages.push({type:"rep",text:q,step});

  const result = analyseQuestion(q);
  if(result) practiceScores.push(result);

  const responses = RESPONSES_I18N[currentLang][clientKey];
  const topicResponses = responses[topicIdx];
  const prospectReply = topicResponses[step];
  practiceMessages.push({type:"prospect",text:prospectReply});

  if(result){
    practiceMessages.push({type:"coach",result,step});
  }

  practiceStep++;
  if(practiceStep >= 4) practicePhase="done";
  render();
}

function skipStep(){
  practiceStep++;
  if(practiceStep >= 4) practicePhase="done";
  render();
}

function scrollThread(){
  const t = document.getElementById("thread");
  if(t) setTimeout(()=>{t.scrollTop=t.scrollHeight;},80);
}

function printCard(){
  const ui = L();
  const topic = T()[topicIdx];
  const tColors=["#0050FF","#F59E0B","#EF4444","#10B981"];
  const tDims=["rgba(0,80,255,0.08)","rgba(245,158,11,0.12)","rgba(239,68,68,0.12)","rgba(16,185,129,0.12)"];
  const rows = ui.tLabels.map((l,i)=>`
    <div style="border:1px solid #E5E7EB;border-radius:8px;margin-bottom:12px;overflow:hidden">
      <div style="padding:10px 16px;font-weight:700;font-size:12px;color:${tColors[i]};background:${tDims[i]}">${l}</div>
      <div style="padding:14px 16px;font-size:14px;color:#0F172A;min-height:48px;line-height:1.6">${buildVals[i]||'<em style="color:#9CA3AF">—</em>'}</div>
    </div>`).join("");
  const dir = currentLang==="ar"?"rtl":"ltr";
  const w = window.open("","_blank");
  w.document.write(`<!DOCTYPE html><html dir="${dir}"><head><title>Fresha 4T · ${topic.title}</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>body{font-family:'DM Sans',sans-serif;padding:48px;max-width:640px;margin:0 auto;color:#0F172A}
  h2{font-size:24px;font-weight:700;margin-bottom:8px;letter-spacing:-.4px}
  p{color:#64748B;font-size:14px;margin-bottom:32px;font-weight:500}
  @media print{body{padding:20px}}</style></head>
  <body><h2>${topic.title}</h2>
  <p>Fresha · 4T Discovery · ${C()[clientKey].name} · ${new Date().toLocaleDateString(currentLang==="ar"?"ar-SA":currentLang==="es"?"es-ES":"en-GB")}</p>
  ${rows}</body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),400);
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>"); }

// ════════════════════════════════════════════════════════════
// MIC ENGINE (improved for iframe/Notion embeds)
// ════════════════════════════════════════════════════════════
let activeMicKey = null;
let activeMicRecog = null;

function showToast(msg){
  const el = document.getElementById("mic-toast");
  if(!el) return;
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(()=> el.classList.remove("show"), 4000);
}

function toggleMic(key, targetId) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast(L().micUnsupported); return; }

  const btn = document.getElementById("mic-" + key);
  if (!btn) return;

  // If already recording, stop
  if (activeMicKey) {
    if (activeMicRecog) { try { activeMicRecog.stop(); } catch(e){} }
    const oldBtn = document.getElementById("mic-" + activeMicKey);
    if (oldBtn) { oldBtn.classList.remove("recording"); oldBtn.textContent = "🎤"; }
    if (activeMicKey === key) { activeMicKey = null; activeMicRecog = null; return; }
  }

  const recog = new SR();
  recog.lang = LANG_CODES[currentLang] || "en-GB";
  recog.interimResults = false;
  recog.maxAlternatives = 1;
  recog.continuous = false;

  btn.classList.add("recording");
  btn.textContent = "⏹";
  activeMicKey = key;
  activeMicRecog = recog;

  try {
    recog.start();
  } catch(e) {
    btn.classList.remove("recording");
    btn.textContent = "🎤";
    activeMicKey = null;
    activeMicRecog = null;
    showToast(L().micBlocked);
    return;
  }

  recog.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    const ta = document.getElementById(targetId);
    if (ta) {
      ta.value = ta.value ? ta.value + " " + transcript : transcript;
      ta.dispatchEvent(new Event("input"));
    }
  };

  recog.onend = () => {
    btn.classList.remove("recording");
    btn.textContent = "🎤";
    activeMicKey = null;
    activeMicRecog = null;
    if (targetId.startsWith("qta-")) {
      const idx = parseInt(targetId.replace("qta-",""));
      if (!isNaN(idx)) {
        const ta = document.getElementById(targetId);
        if (ta) { buildVals[idx] = ta.value; showBuildFeedback(idx); }
      }
    }
  };

  recog.onerror = (e) => {
    btn.classList.remove("recording");
    btn.textContent = "🎤";
    activeMicKey = null;
    activeMicRecog = null;
    if (e.error === "not-allowed" || e.error === "service-not-allowed") {
      showToast(L().micBlocked);
    }
  };
}

// ── BOOT ──
freshPersona();
render();
</script>
